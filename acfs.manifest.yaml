  - id: agents.claude
    description: Claude Code
    category: agents
    phase: 7
    run_as: target_user
    optional: false
    enabled_by_default: true
    tags: [recommended, agent]
    dependencies:
      - base.system
    installed_check:
      run_as: target_user
      command: 'test -x "${ACFS_BIN_DIR:-$HOME/.local/bin}/claude" || test -x "$HOME/.local/bin/claude"'
    verified_installer:
      tool: claude
      runner: bash
      args: ["latest"]
    install:
      - |
        claude_candidate=""
        for candidate in "$HOME/.claude/bin/claude" "$HOME/.claude/local/bin/claude" "$HOME/.bun/bin/claude"; do
          if [[ -x "$candidate" ]]; then
            claude_candidate="$candidate"
            break
          fi
        done
        if [[ -z "$claude_candidate" ]] && [[ -d "$HOME/.claude" ]]; then
          claude_candidate="$(find "$HOME/.claude" -maxdepth 4 -type f -name claude -perm -111 -print -quit 2>/dev/null || true)"
        fi
        if [[ -z "$claude_candidate" ]] || [[ ! -x "$claude_candidate" ]]; then
          echo "Claude Code: installed but no runnable claude binary found" >&2
          exit 1
        fi
        acfs_link_primary_bin_command "$claude_candidate" "claude"
    verify:
      - |
        target_bin="${ACFS_BIN_DIR:-$HOME/.local/bin}"
        "$target_bin/claude" --version || "$target_bin/claude" --help
    notes:
      - "Updated via verified installer (curl claude.ai/install.sh | bash -- latest); 'claude update --channel' flag does not exist"
      - "Binary normalized into the configured ACFS bin dir"

