# ACFS Module Manifest
# Single source of truth for all tools installed by the Agentic Coding Flywheel Setup
# Version: 2
version: 2
name: agentic_coding_flywheel_setup
id: acfs

defaults:
  user: ubuntu
  workspace_root: /data/projects
  mode: vibe

modules:
  # ============================================================
  # PHASE 1: Base dependencies (apt packages)
  # ============================================================
  - id: base.system
    description: Base packages + sane defaults
    category: base
    phase: 1
    run_as: root
    optional: false
    enabled_by_default: true
    tags: [critical]
    installed_check:
      run_as: current
      command: "command -v curl && command -v git && command -v jq"
    install:
      - apt-get update -y
      - apt-get install -y curl git ca-certificates unzip tar xz-utils jq build-essential gnupg lsb-release
    verify:
      - curl --version
      - git --version
      - jq --version
      - gpg --version

  # ============================================================
  # PHASE 2: User normalization (ORCHESTRATION-ONLY)
  # ============================================================
  - id: users.ubuntu
    description: Ensure target user + passwordless sudo + ssh keys
    category: users
    phase: 2
    run_as: root
    optional: false
    enabled_by_default: true
    generated: false
    tags: [orchestration, critical]
    notes:
      - "Ensure TARGET_USER exists with the expected home directory"
      - "Write /etc/sudoers.d/90-ubuntu-acfs with passwordless sudo for TARGET_USER in vibe mode"
      - "Copy authorized_keys from invoking user to TARGET_HOME/.ssh/"
    install: []
    verify:
      - "id \"${TARGET_USER:-ubuntu}\""
      - "[[ \"${MODE:-vibe}\" != \"vibe\" ]] || runuser -u \"${TARGET_USER:-ubuntu}\" -- sudo -n true"

  # ============================================================
  # PHASE 3: Filesystem setup
  # ============================================================
  - id: base.filesystem
    description: Create workspace and ACFS directories
    category: filesystem
    phase: 3
    run_as: root
    optional: false
    enabled_by_default: true
    tags: [critical]
    dependencies:
      - users.ubuntu
    installed_check:
      run_as: target_user
      command: "test -d /data/projects && test -d ~/.acfs"
    install:
      - |
          # Hardening: refuse to operate on symlinked workspace paths.
          # Prevents symlink tricks like /data -> / or /data/projects -> /etc.
          for p in /data /data/projects /data/cache; do
            if [[ -e "$p" && -L "$p" ]]; then
              echo "ERROR: Refusing to use symlinked path: $p" >&2
              exit 1
            fi
          done

          mkdir -p /data/projects /data/cache
          chown -h "${TARGET_USER:-ubuntu}:${TARGET_USER:-ubuntu}" /data /data/projects /data/cache
      - |
          # Install AGENTS.md template to workspace root for agent guidance
          ACFS_RAW="${ACFS_RAW:-https://raw.githubusercontent.com/Dicklesworthstone/agentic_coding_flywheel_setup/${ACFS_REF:-main}}"
          CURL_ARGS=(-fsSL)
          if curl --help all 2>/dev/null | grep -q -- '--proto'; then
            CURL_ARGS=(--proto '=https' --proto-redir '=https' -fsSL)
          fi
          curl "${CURL_ARGS[@]}" -o /data/projects/AGENTS.md "${ACFS_RAW}/acfs/AGENTS.md" || true
          chown "${TARGET_USER:-ubuntu}:${TARGET_USER:-ubuntu}" /data/projects/AGENTS.md 2>/dev/null || true
      - |
          target_home=""
          explicit_target_home="${TARGET_HOME:-}"
          if [[ -n "$explicit_target_home" ]]; then
            explicit_target_home="${explicit_target_home%/}"
          fi
          if [[ "${TARGET_USER:-ubuntu}" == "root" ]]; then
            target_home="/root"
          else
            _acfs_passwd_entry="$(acfs_generated_getent_passwd_entry "${TARGET_USER:-ubuntu}" 2>/dev/null || true)"
            if [[ -n "$_acfs_passwd_entry" ]]; then
              target_home="$(acfs_generated_passwd_home_from_entry "$_acfs_passwd_entry" 2>/dev/null || true)"
            else
              current_user="$(acfs_generated_resolve_current_user 2>/dev/null || true)"
              current_home="${HOME:-}"
              if [[ -n "$current_home" ]]; then
                current_home="${current_home%/}"
              fi
              if [[ -n "$current_user" ]] && [[ "$current_user" == "${TARGET_USER:-ubuntu}" ]] && [[ -n "$current_home" ]] && [[ "$current_home" == /* ]] && [[ "$current_home" != "/" ]] && { [[ -z "$explicit_target_home" ]] || [[ "$current_home" == "$explicit_target_home" ]]; }; then
                target_home="$current_home"
              fi
              unset current_user current_home
            fi
            unset _acfs_passwd_entry
          fi
          unset explicit_target_home
          if [[ -z "$target_home" ]]; then
            echo "ERROR: Unable to resolve TARGET_HOME for '${TARGET_USER:-ubuntu}'; export TARGET_HOME explicitly" >&2
            exit 1
          fi
          if [[ -z "$target_home" || "$target_home" == "/" || "$target_home" != /* ]]; then
            echo "ERROR: Invalid TARGET_HOME: '${target_home:-<empty>}'" >&2
            exit 1
          fi
          if [[ -e "$target_home/.acfs" && -L "$target_home/.acfs" ]]; then
            echo "ERROR: Refusing to use symlinked ACFS dir: $target_home/.acfs" >&2
            exit 1
          fi

          mkdir -p "$target_home/.acfs"
          chown -hR "${TARGET_USER:-ubuntu}:${TARGET_USER:-ubuntu}" "$target_home/.acfs"
    verify:
      - test -d /data/projects
      - test -f /data/projects/AGENTS.md
      - |
          # Resolve TARGET_HOME using generated helper functions. Doctor
          # injects these helpers for manifest checks that reference
          # acfs_generated_* functions, so this stays consistent with
          # installer target-home resolution and avoids inherited HOME leaks.
          explicit_target_home="${TARGET_HOME:-}"
          if [[ -n "$explicit_target_home" ]]; then
            explicit_target_home="${explicit_target_home%/}"
          fi
          target_home=""
          if [[ "${TARGET_USER:-ubuntu}" == "root" ]]; then
            target_home="/root"
          else
            _acfs_passwd_entry="$(acfs_generated_getent_passwd_entry "${TARGET_USER:-ubuntu}" 2>/dev/null || true)"
            if [[ -n "$_acfs_passwd_entry" ]]; then
              target_home="$(acfs_generated_passwd_home_from_entry "$_acfs_passwd_entry" 2>/dev/null || true)"
            else
              current_user="$(acfs_generated_resolve_current_user 2>/dev/null || true)"
              current_home="${HOME:-}"
              if [[ -n "$current_home" ]]; then
                current_home="${current_home%/}"
              fi
              if [[ -n "$current_user" ]] && [[ "$current_user" == "${TARGET_USER:-ubuntu}" ]] && [[ -n "$current_home" ]] && [[ "$current_home" == /* ]] && [[ "$current_home" != "/" ]] && { [[ -z "$explicit_target_home" ]] || [[ "$current_home" == "$explicit_target_home" ]]; }; then
                target_home="$current_home"
              fi
              unset current_user current_home
            fi
            unset _acfs_passwd_entry
          fi
          unset explicit_target_home
          if [[ -z "$target_home" ]] || [[ "$target_home" == "/" ]] || [[ "$target_home" != /* ]]; then
            echo "ERROR: Unable to resolve TARGET_HOME for '${TARGET_USER:-ubuntu}'; export TARGET_HOME explicitly (got: '${target_home:-<empty>}')" >&2
            exit 1
          fi
          test -d "$target_home/.acfs"
    notes:
      - "~/.acfs created during filesystem phase"
      - "AGENTS.md template installed to /data/projects for agent guidance"

  # ============================================================
  # PHASE 4: Shell setup (zsh + oh-my-zsh + p10k)
  # ============================================================
  - id: shell.zsh
    description: Zsh shell package
    category: shell
    phase: 4
    run_as: root
    optional: false
    enabled_by_default: true
    tags: [critical, shell-ux]
    dependencies:
      - base.system
      - base.filesystem
    installed_check:
      run_as: current
      command: "command -v zsh"
    install:
      - apt-get install -y zsh
    verify:
      - zsh --version

  - id: shell.omz
    description: Oh My Zsh + Powerlevel10k + plugins + ACFS config
    category: shell
    phase: 4
    run_as: target_user
    optional: false
    enabled_by_default: true
    tags: [critical, shell-ux]
    dependencies:
      - shell.zsh
    installed_check:
      run_as: target_user
      command: "test -d ~/.oh-my-zsh && test -f ~/.acfs/zsh/acfs.zshrc"
    verified_installer:
      tool: ohmyzsh
      runner: sh
      args: ["--", "--unattended", "--keep-zshrc"]
    install:
      - |
        # Install Powerlevel10k
        if [[ ! -d ~/.oh-my-zsh/custom/themes/powerlevel10k ]]; then
          git clone --depth=1 https://github.com/romkatv/powerlevel10k.git ~/.oh-my-zsh/custom/themes/powerlevel10k
        fi
      - |
        # Install zsh-autosuggestions
        if [[ ! -d ~/.oh-my-zsh/custom/plugins/zsh-autosuggestions ]]; then
          git clone https://github.com/zsh-users/zsh-autosuggestions ~/.oh-my-zsh/custom/plugins/zsh-autosuggestions
        fi
      - |
        # Install zsh-syntax-highlighting
        if [[ ! -d ~/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting ]]; then
          git clone https://github.com/zsh-users/zsh-syntax-highlighting.git ~/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting
        fi
      - |
        # Install ACFS zshrc
        ACFS_RAW="${ACFS_RAW:-https://raw.githubusercontent.com/Dicklesworthstone/agentic_coding_flywheel_setup/${ACFS_REF:-main}}"
        mkdir -p ~/.acfs/zsh
        CURL_ARGS=(-fsSL)
        if curl --help all 2>/dev/null | grep -q -- '--proto'; then
          CURL_ARGS=(--proto '=https' --proto-redir '=https' -fsSL)
        fi
        curl "${CURL_ARGS[@]}" -o ~/.acfs/zsh/acfs.zshrc "${ACFS_RAW}/acfs/zsh/acfs.zshrc"
      - |
        # Install ACFS shell completions (zsh)
        ACFS_RAW="${ACFS_RAW:-https://raw.githubusercontent.com/Dicklesworthstone/agentic_coding_flywheel_setup/${ACFS_REF:-main}}"
        mkdir -p ~/.acfs/completions
        CURL_ARGS=(-fsSL)
        if curl --help all 2>/dev/null | grep -q -- '--proto'; then
          CURL_ARGS=(--proto '=https' --proto-redir '=https' -fsSL)
        fi
        curl "${CURL_ARGS[@]}" -o ~/.acfs/completions/_acfs "${ACFS_RAW}/scripts/completions/_acfs"
        # Also install bash completions for users who switch shells
        curl "${CURL_ARGS[@]}" -o ~/.acfs/completions/acfs.bash "${ACFS_RAW}/scripts/completions/acfs.bash"
      - |
        # Install pre-configured Powerlevel10k settings (prevents config wizard on first login)
        ACFS_RAW="${ACFS_RAW:-https://raw.githubusercontent.com/Dicklesworthstone/agentic_coding_flywheel_setup/${ACFS_REF:-main}}"
        CURL_ARGS=(-fsSL)
        if curl --help all 2>/dev/null | grep -q -- '--proto'; then
          CURL_ARGS=(--proto '=https' --proto-redir '=https' -fsSL)
        fi
        curl "${CURL_ARGS[@]}" -o ~/.p10k.zsh "${ACFS_RAW}/acfs/zsh/p10k.zsh"
      - |
        # Setup loader .zshrc
        acfs_zshrc_is_managed_loader() {
          local file="${1:-}"

          [[ -f "$file" ]] || return 1
          awk '
            /^[[:space:]]*$/ { next }
            { lines[++line_count]=$0 }
            END {
              if (line_count == 2 &&
                  lines[1] ~ /^# ACFS loader/ &&
                  lines[2] == "source \"$HOME/.acfs/zsh/acfs.zshrc\"") {
                exit 0
              }
              exit 1
            }
          ' "$file" 2>/dev/null
        }

        if [[ -f ~/.zshrc ]] && ! acfs_zshrc_is_managed_loader ~/.zshrc; then
          mv ~/.zshrc ~/.zshrc.bak.$(date +%s)
        fi
        echo '# ACFS loader' > ~/.zshrc
        echo 'source "$HOME/.acfs/zsh/acfs.zshrc"' >> ~/.zshrc
      - |
        # Setup ~/.profile for bash login shells (prevents PATH warnings from installers)
        profile_path_has_fragment() {
          local file="${1:-}"
          local fragment="${2:-}"

          [[ -n "$file" && -n "$fragment" && -f "$file" ]] || return 1
          awk -v fragment="$fragment" '
            /^[[:space:]]*#/ { next }
            /^[[:space:]]*(export[[:space:]]+)?PATH[[:space:]]*=/ && index($0, fragment) { found=1; exit }
            END { exit(found ? 0 : 1) }
          ' "$file" 2>/dev/null
        }

        legacy_profile_path_line='export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$HOME/.bun/bin:$PATH"'
        profile_path_line='export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$HOME/.bun/bin:$HOME/.atuin/bin:$PATH"'
        if [[ ! -f ~/.profile ]]; then
          echo '# ~/.profile: executed by bash for login shells' > ~/.profile
          echo '' >> ~/.profile
          echo '# User binary paths' >> ~/.profile
          echo "$profile_path_line" >> ~/.profile
        elif grep -Fxq "$legacy_profile_path_line" ~/.profile; then
          sed -i "s|^$(printf '%s' "$legacy_profile_path_line" | sed 's/[][\\.^$*|]/\\&/g')$|$profile_path_line|" ~/.profile
        elif ! profile_path_has_fragment ~/.profile '.local/bin' || ! profile_path_has_fragment ~/.profile '.atuin/bin'; then
          echo '' >> ~/.profile
          echo '# Added by ACFS - user binary paths' >> ~/.profile
          echo "$profile_path_line" >> ~/.profile
        fi
      - |
        # Setup ~/.zprofile for zsh login shells (zsh does NOT read ~/.profile)
        profile_path_has_fragment() {
          local file="${1:-}"
          local fragment="${2:-}"

          [[ -n "$file" && -n "$fragment" && -f "$file" ]] || return 1
          awk -v fragment="$fragment" '
            /^[[:space:]]*#/ { next }
            /^[[:space:]]*(export[[:space:]]+)?PATH[[:space:]]*=/ && index($0, fragment) { found=1; exit }
            END { exit(found ? 0 : 1) }
          ' "$file" 2>/dev/null
        }

        legacy_profile_path_line='export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$HOME/.bun/bin:$PATH"'
        profile_path_line='export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$HOME/.bun/bin:$HOME/.atuin/bin:$PATH"'
        if [[ ! -f ~/.zprofile ]]; then
          echo '# ~/.zprofile: executed by zsh for login shells' > ~/.zprofile
          echo '' >> ~/.zprofile
          echo '# User binary paths' >> ~/.zprofile
          echo "$profile_path_line" >> ~/.zprofile
        elif grep -Fxq "$legacy_profile_path_line" ~/.zprofile; then
          sed -i "s|^$(printf '%s' "$legacy_profile_path_line" | sed 's/[][\\.^$*|]/\\&/g')$|$profile_path_line|" ~/.zprofile
        elif ! profile_path_has_fragment ~/.zprofile '.local/bin' || ! profile_path_has_fragment ~/.zprofile '.atuin/bin'; then
          echo '' >> ~/.zprofile
          echo '# Added by ACFS - user binary paths' >> ~/.zprofile
          echo "$profile_path_line" >> ~/.zprofile
        fi
      - |
        # Set default shell
        acfs_external_shell_handoff_configured() {
          local bashrc_path="${1:-}"
          [[ -n "$bashrc_path" && -f "$bashrc_path" ]] || return 1

          awk '
              $0 == "# ACFS externally-managed shell handoff" { marker=1; next }
              marker && $0 ~ /^[[:space:]]*#/ { next }
              marker && index($0, "command -v zsh") && index($0, "ACFS_ZSH_HANDOFF_ACTIVE") { found=1; exit }
              marker && $0 !~ /^[[:space:]]*$/ { marker=0 }
              END { exit(found ? 0 : 1) }
          ' "$bashrc_path" 2>/dev/null
        }

        if [[ "$SHELL" != */zsh ]]; then
          zsh_path="$(command -v zsh || true)"
          if [[ -z "$zsh_path" ]]; then
            echo "WARN: zsh not found; cannot set default shell automatically." >&2
            exit 0
          fi
          current_user="$(acfs_generated_resolve_current_user 2>/dev/null || true)"
          if [[ -z "$current_user" ]]; then
            echo "WARN: Unable to resolve current user; skipping default shell change." >&2
            exit 0
          fi
          passwd_entry="$(acfs_generated_getent_passwd_entry "$current_user" 2>/dev/null || true)"
          local_entry=""
          if [[ -r /etc/passwd ]]; then
            local_entry="$(awk -F: -v user="$current_user" '$1 == user { print $0; exit }' /etc/passwd 2>/dev/null || true)"
          fi
          if [[ -n "$passwd_entry" ]] && [[ -z "$local_entry" ]]; then
            if ! acfs_external_shell_handoff_configured ~/.bashrc; then
              if [[ -f ~/.bashrc ]] && [[ -s ~/.bashrc ]]; then
                last_char="$(tail -c 1 ~/.bashrc | od -An -t u1 | tr -d ' ' 2>/dev/null || true)"
                if [[ "$last_char" != "10" ]]; then
                  printf '\n' >> ~/.bashrc
                fi
              fi
              {
                echo '# ACFS externally-managed shell handoff'
                echo 'if [[ $- == *i* ]] && [[ -t 0 ]] && command -v zsh >/dev/null 2>&1 && [[ -z "${ACFS_ZSH_HANDOFF_ACTIVE:-}" ]]; then'
                echo '  export ACFS_ZSH_HANDOFF_ACTIVE=1'
                echo '  exec "$(command -v zsh)" -l'
                echo 'fi'
              } >> ~/.bashrc
            fi
            echo "WARN: $current_user is managed outside /etc/passwd; installed a bash-to-zsh handoff instead of using chsh." >&2
          elif command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
            sudo chsh -s "$zsh_path" "$current_user"
          else
            if [[ -t 0 ]]; then
              if ! chsh -s "$zsh_path"; then
                echo "WARN: Could not change default shell automatically. Run: chsh -s $zsh_path" >&2
              fi
            else
              echo "WARN: Skipping shell change (no TTY). Run: chsh -s $zsh_path" >&2
            fi
          fi
        fi
    verify:
      - test -d ~/.oh-my-zsh
      - test -f ~/.acfs/zsh/acfs.zshrc
      - test -f ~/.p10k.zsh
    notes:
      - "Oh My Zsh and plugins installed via verified upstream installers"
      - "acfs.zshrc written from acfs/ assets"
      - "Externally managed accounts (for example NSS/OS Login users) get a bash-to-zsh handoff instead of a local chsh"
      - "Pre-configured p10k theme settings prevent wizard on first login"

  # ============================================================
  # PHASE 5: CLI tools
  # ============================================================
  - id: cli.modern
    description: Modern CLI tools referenced by the zshrc intent
    category: cli
    phase: 5
    run_as: root
    optional: false
    enabled_by_default: true
    tags: [recommended, cli-modern]
    dependencies:
      - base.system
    installed_check:
      run_as: current
      command: "command -v rg && command -v tmux && command -v fzf"
    install:
      - apt-get install -y ripgrep tmux fzf direnv jq gh git-lfs lsof dnsutils netcat-openbsd strace rsync
      - apt-get install -y lsd || true
      - apt-get install -y eza || true
      - apt-get install -y bat || apt-get install -y batcat || true
      - apt-get install -y fd-find || true
      - apt-get install -y btop || true
      - apt-get install -y dust || true
      - apt-get install -y neovim || true
      - apt-get install -y docker.io docker-compose-plugin || true
    verify:
      - rg --version
      - tmux -V
      - fzf --version
      - gh --version
      - git-lfs version
      - rsync --version
      - strace --version
      - command -v lsof
      - command -v dig
      - command -v nc
      - command -v lsd || command -v eza || true

  - id: tools.lazygit
    description: Lazygit (apt or binary fallback)
    category: tools
    phase: 5
    run_as: root
    optional: false
    enabled_by_default: true
    tags: [recommended, cli-modern]
    dependencies:
      - base.system
    installed_check:
      run_as: current
      command: "command -v lazygit"
    install:
      - |
        if apt-get install -y lazygit; then
          exit 0
        fi
        # Fallback to binary install
        LG_VER="0.44.1"
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64) LG_SHA="84682f4ad5a449d0a3ffbc8332200fe8651aee9dd91dcd8d87197ba6c2450dbc" ;;
          aarch64) LG_SHA="26a435f47b691325c086dad2f84daa6556df5af8efc52b6ed624fa657605c976" ;;
          *) echo "Unsupported arch for lazygit binary: $ARCH"; exit 0 ;;
        esac
        
        LG_URL="https://github.com/jesseduffield/lazygit/releases/download/v${LG_VER}/lazygit_${LG_VER}_Linux_${ARCH}.tar.gz"
        TMP_FILE="$(mktemp "${TMPDIR:-/tmp}/acfs_install.XXXXXX")"
        trap 'rm -f "$TMP_FILE"' EXIT
        
        curl -fsSL "$LG_URL" -o "$TMP_FILE"
        echo "$LG_SHA $TMP_FILE" | sha256sum -c - || { echo "Checksum failed"; rm "$TMP_FILE"; exit 1; }
        
        tar -xzf "$TMP_FILE" -C /usr/local/bin lazygit
        chmod +x /usr/local/bin/lazygit
        rm "$TMP_FILE"
    verify:
      - lazygit --version

  - id: tools.lazydocker
    description: Lazydocker (binary install)
    category: tools
    phase: 5
    run_as: root
    optional: false
    enabled_by_default: true
    tags: [recommended, cli-modern]
    dependencies:
      - base.system
    installed_check:
      run_as: current
      command: "command -v lazydocker"
    install:
      - |
        LD_VER="0.23.3"
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64) LD_SHA="1f3c7037326973b85cb85447b2574595103185f8ed067b605dd43cc201bc8786" ;;
          aarch64) LD_SHA="ae7bed0309289396d396b8502b2d78d153a4f8ce8add042f655332241e7eac31" ;;
          *) echo "Unsupported arch for lazydocker binary: $ARCH"; exit 0 ;;
        esac
        
        LD_URL="https://github.com/jesseduffield/lazydocker/releases/download/v${LD_VER}/lazydocker_${LD_VER}_Linux_${ARCH}.tar.gz"
        TMP_FILE="$(mktemp "${TMPDIR:-/tmp}/acfs_install.XXXXXX")"
        trap 'rm -f "$TMP_FILE"' EXIT
        
        curl -fsSL "$LD_URL" -o "$TMP_FILE"
        echo "$LD_SHA $TMP_FILE" | sha256sum -c - || { echo "Checksum failed"; rm "$TMP_FILE"; exit 1; }
        
        tar -xzf "$TMP_FILE" -C /usr/local/bin lazydocker
        chmod +x /usr/local/bin/lazydocker
        rm "$TMP_FILE"
    verify:
      - lazydocker --version

  # Network tools (still Phase 5)
  - id: network.tailscale
    description: Zero-config mesh VPN for secure remote VPS access
    category: network
    phase: 5
    run_as: root
    optional: false
    enabled_by_default: true
    tags: [networking, vpn, security, google-sso]
    dependencies:
      - base.system
    installed_check:
      run_as: current
      command: "command -v tailscale"
    install:
      - |
        # Add Tailscale apt repository
        DISTRO_CODENAME=$(lsb_release -cs 2>/dev/null || echo "jammy")
        # Map newer Ubuntu codenames to supported ones
        case "$DISTRO_CODENAME" in
          oracular|plucky|questing) DISTRO_CODENAME="noble" ;;
        esac
        CURL_ARGS=(-fsSL)
        if curl --help all 2>/dev/null | grep -q -- '--proto'; then
          CURL_ARGS=(--proto '=https' --proto-redir '=https' -fsSL)
        fi
        curl "${CURL_ARGS[@]}" "https://pkgs.tailscale.com/stable/ubuntu/${DISTRO_CODENAME}.noarmor.gpg" \
          | tee /usr/share/keyrings/tailscale-archive-keyring.gpg >/dev/null
        echo "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/ubuntu ${DISTRO_CODENAME} main" \
          | tee /etc/apt/sources.list.d/tailscale.list
        apt-get update
        apt-get install -y tailscale
        systemctl enable tailscaled
    verify:
      - tailscale version
      - systemctl is-enabled tailscaled
    docs_url: https://tailscale.com/kb/
    post_install_message: |
      Tailscale installed! To connect your VPS to your Tailscale network:
        sudo tailscale up
      Then log in with your Google account at the URL shown.
      Once connected, you can access your VPS via its Tailscale IP or hostname.

  - id: network.ssh_keepalive
    description: Configure SSH server keepalive to prevent VPN/NAT disconnects
    category: network
    phase: 5
    run_as: root
    optional: true
    enabled_by_default: true
    tags: [networking, remote-dev, ssh]
    dependencies:
      - base.system
    installed_check:
      run_as: current
      command: |
        # Check if ClientAliveInterval is configured (non-zero)
        grep -qE '^ClientAliveInterval[[:space:]]+[1-9]' /etc/ssh/sshd_config 2>/dev/null
    install:
      - |
        # Backup original sshd_config if not already backed up
        if [[ ! -f /etc/ssh/sshd_config.acfs.bak ]]; then
          cp /etc/ssh/sshd_config /etc/ssh/sshd_config.acfs.bak
        fi

        # Configure SSH keepalive settings
        # ClientAliveInterval: send keepalive every 60 seconds
        # ClientAliveCountMax: disconnect after 3 missed (3 minutes of real disconnect)

        # Remove any existing ClientAlive settings
        sed -i '/^#*ClientAliveInterval/d' /etc/ssh/sshd_config
        sed -i '/^#*ClientAliveCountMax/d' /etc/ssh/sshd_config

        # Add new settings at the end
        echo "" >> /etc/ssh/sshd_config
        echo "# ACFS: SSH keepalive for VPN/NAT resilience" >> /etc/ssh/sshd_config
        echo "ClientAliveInterval 60" >> /etc/ssh/sshd_config
        echo "ClientAliveCountMax 3" >> /etc/ssh/sshd_config

        # Reload sshd (doesn't kill existing connections)
        systemctl reload sshd || systemctl reload ssh || true
    verify:
      - grep -E '^ClientAliveInterval[[:space:]]+60' /etc/ssh/sshd_config
      - grep -E '^ClientAliveCountMax[[:space:]]+3' /etc/ssh/sshd_config
    docs_url: https://man.openbsd.org/sshd_config#ClientAliveInterval
    post_install_message: |
      SSH keepalive configured! Your connections will now survive VPN/NAT timeouts.
      Settings: ClientAliveInterval 60, ClientAliveCountMax 3
      Original config backed up to /etc/ssh/sshd_config.acfs.bak

