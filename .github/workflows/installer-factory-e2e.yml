name: Factory Installer E2E (Fresh Host/QEMU)

on:
  schedule:
    - cron: "0 8 * * 0" # weekly QEMU/KVM factory canary
  workflow_dispatch:
    inputs:
      backend:
        description: "Factory backend"
        default: "qemu"
        required: true
        type: choice
        options:
          - qemu
          - real-host
      ref:
        description: "ACFS ref to install"
        default: "main"
        required: true
      mode:
        description: "Install mode"
        default: "vibe"
        required: true
        type: choice
        options:
          - vibe
          - safe
      expect_ubuntu:
        description: "Expected Ubuntu VERSION_ID on the fresh host"
        default: "25.10"
        required: true
      expect_final_ubuntu:
        description: "Expected Ubuntu VERSION_ID after install/resume"
        default: "25.10"
        required: true
      allow_existing_ubuntu:
        description: "Allow ubuntu user to exist before install"
        default: false
        required: true
        type: boolean
      allow_install_reboot:
        description: "Allow SSH disconnect/reconnect during installer-driven OS upgrade"
        default: false
        required: true
        type: boolean
      install_timeout_seconds:
        description: "Timeout for each installer run"
        default: "14400"
        required: true
      post_reboot_timeout_seconds:
        description: "Timeout for post-reboot resume/assertions"
        default: "14400"
        required: true
      runner:
        description: "Optional runner label override. Leave blank to use ACFS_FACTORY_RUNNER or ubuntu-latest."
        default: ""
        required: false
  repository_dispatch:
    types:
      - acfs-factory-host-ready
  workflow_call:
    inputs:
      backend:
        description: "Factory backend. Use qemu with a KVM-capable runner or real-host with SSH secrets."
        default: "real-host"
        required: false
        type: string
      ref:
        description: "ACFS ref to install"
        default: "main"
        required: false
        type: string
      mode:
        description: "Install mode"
        default: "vibe"
        required: false
        type: string
      expect_ubuntu:
        description: "Expected Ubuntu VERSION_ID on the fresh host"
        default: "25.10"
        required: false
        type: string
      expect_final_ubuntu:
        description: "Expected Ubuntu VERSION_ID after install/resume"
        default: "25.10"
        required: false
        type: string
      allow_existing_ubuntu:
        description: "Allow ubuntu user to exist before install"
        default: false
        required: false
        type: boolean
      allow_install_reboot:
        description: "Allow SSH disconnect/reconnect during installer-driven OS upgrade"
        default: false
        required: false
        type: boolean
      install_timeout_seconds:
        description: "Timeout for each installer run"
        default: "14400"
        required: false
        type: string
      post_reboot_timeout_seconds:
        description: "Timeout for post-reboot resume/assertions"
        default: "14400"
        required: false
        type: string
      runner:
        description: "Optional runner label override. Leave blank to use ACFS_FACTORY_RUNNER or ubuntu-latest."
        default: ""
        required: false
        type: string
    secrets:
      ACFS_FACTORY_SSH_TARGET:
        required: false
      ACFS_FACTORY_SSH_PRIVATE_KEY:
        required: false
      ACFS_FACTORY_SSH_PORT:
        required: false
      ACFS_FACTORY_PUBLIC_KEY:
        required: false

jobs:
  factory-e2e:
    name: Fresh Ubuntu ${{ inputs.expect_ubuntu || github.event.client_payload.expect_ubuntu || '25.10' }} factory install
    runs-on: ${{ inputs.runner || github.event.client_payload.runner || vars.ACFS_FACTORY_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 360
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve factory backend
        id: config
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_BACKEND: ${{ inputs.backend || '' }}
          DISPATCH_BACKEND: ${{ github.event.client_payload.backend || '' }}
          DISPATCH_SSH_TARGET: ${{ github.event.client_payload.ssh_target || '' }}
          SSH_TARGET: ${{ secrets.ACFS_FACTORY_SSH_TARGET }}
          SSH_PRIVATE_KEY: ${{ secrets.ACFS_FACTORY_SSH_PRIVATE_KEY }}
        run: |
          backend="${INPUT_BACKEND:-}"
          effective_ssh_target="${DISPATCH_SSH_TARGET:-${SSH_TARGET:-}}"
          if [[ -z "$backend" && -n "${DISPATCH_BACKEND:-}" ]]; then
            backend="$DISPATCH_BACKEND"
          fi
          if [[ -z "$backend" && "$EVENT_NAME" == "schedule" ]]; then
            backend="qemu"
          fi
          if [[ -z "$backend" ]]; then
            backend="real-host"
          fi

          case "$backend" in
            qemu|real-host) ;;
            *)
              echo "::error::Unsupported backend: $backend"
              exit 1
              ;;
          esac

          echo "backend=$backend" >> "$GITHUB_OUTPUT"
          echo "enabled=true" >> "$GITHUB_OUTPUT"

          if [[ "$backend" == "real-host" && ( -z "${effective_ssh_target:-}" || -z "${SSH_PRIVATE_KEY:-}" ) ]]; then
            echo "::error::real-host factory E2E requires client_payload.ssh_target or ACFS_FACTORY_SSH_TARGET, plus ACFS_FACTORY_SSH_PRIVATE_KEY."
            exit 1
          fi

      - name: Prepare SSH material
        if: steps.config.outputs.enabled == 'true' && steps.config.outputs.backend == 'real-host'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ACFS_FACTORY_SSH_PRIVATE_KEY }}
          PUBLIC_KEY: ${{ secrets.ACFS_FACTORY_PUBLIC_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/acfs-factory-e2e"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$RUNNER_TEMP/acfs-factory-e2e/id"
          chmod 600 "$RUNNER_TEMP/acfs-factory-e2e/id"
          if [[ -n "${PUBLIC_KEY:-}" ]]; then
            printf '%s\n' "$PUBLIC_KEY" > "$RUNNER_TEMP/acfs-factory-e2e/id.pub"
          fi

      - name: Install QEMU dependencies
        if: steps.config.outputs.enabled == 'true' && steps.config.outputs.backend == 'qemu'
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils cloud-image-utils openssh-client

      - name: Enable KVM access
        if: steps.config.outputs.enabled == 'true' && steps.config.outputs.backend == 'qemu'
        run: |
          if [[ -e /dev/kvm ]]; then
            echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules >/dev/null
            sudo udevadm control --reload-rules
            sudo udevadm trigger --name-match=kvm || true
            sudo chmod 666 /dev/kvm || true
          fi

      - name: Verify KVM-capable runner
        if: steps.config.outputs.enabled == 'true' && steps.config.outputs.backend == 'qemu'
        run: |
          if [[ ! -e /dev/kvm ]]; then
            echo "::error::QEMU backend requires /dev/kvm. Set repository variable ACFS_FACTORY_RUNNER, workflow input runner, or client_payload.runner to a KVM-capable larger/self-hosted runner; otherwise use backend=real-host."
            exit 1
          fi
          if [[ ! -r /dev/kvm || ! -w /dev/kvm ]]; then
            ls -l /dev/kvm || true
            echo "::error::/dev/kvm exists but is not readable/writable by the workflow user."
            exit 1
          fi

      - name: Run QEMU factory installer E2E
        if: steps.config.outputs.enabled == 'true' && steps.config.outputs.backend == 'qemu'
        env:
          INPUT_REF: ${{ inputs.ref || github.event.client_payload.ref || 'main' }}
          INPUT_MODE: ${{ inputs.mode || github.event.client_payload.mode || 'vibe' }}
          INPUT_EXPECT_UBUNTU: ${{ inputs.expect_ubuntu || github.event.client_payload.expect_ubuntu || '25.10' }}
          INPUT_EXPECT_FINAL_UBUNTU: ${{ inputs.expect_final_ubuntu || github.event.client_payload.expect_final_ubuntu || '25.10' }}
          INPUT_ALLOW_INSTALL_REBOOT: ${{ inputs.allow_install_reboot || github.event.client_payload.allow_install_reboot || false }}
          INPUT_TIMEOUT: ${{ inputs.install_timeout_seconds || github.event.client_payload.install_timeout_seconds || '14400' }}
          INPUT_POST_REBOOT_TIMEOUT: ${{ inputs.post_reboot_timeout_seconds || github.event.client_payload.post_reboot_timeout_seconds || '14400' }}
        run: |
          artifacts_dir="$GITHUB_WORKSPACE/tests/artifacts/qemu-factory-e2e-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          args=(
            --ref "$INPUT_REF"
            --mode "$INPUT_MODE"
            --ubuntu "$INPUT_EXPECT_UBUNTU"
            --expect-final-ubuntu "$INPUT_EXPECT_FINAL_UBUNTU"
            --install-timeout "$INPUT_TIMEOUT"
            --post-reboot-timeout "$INPUT_POST_REBOOT_TIMEOUT"
            --artifacts-dir "$artifacts_dir"
          )
          if [[ "$INPUT_ALLOW_INSTALL_REBOOT" == "true" ]]; then
            args+=(--allow-install-reboot)
          fi
          bash tests/vm/test_factory_install_qemu.sh "${args[@]}"

      - name: Run real-host factory installer E2E
        if: steps.config.outputs.enabled == 'true' && steps.config.outputs.backend == 'real-host'
        env:
          SSH_TARGET: ${{ github.event.client_payload.ssh_target || secrets.ACFS_FACTORY_SSH_TARGET }}
          SSH_PORT: ${{ github.event.client_payload.ssh_port || secrets.ACFS_FACTORY_SSH_PORT }}
          INPUT_REF: ${{ inputs.ref || github.event.client_payload.ref || 'main' }}
          INPUT_MODE: ${{ inputs.mode || github.event.client_payload.mode || 'vibe' }}
          INPUT_EXPECT_UBUNTU: ${{ inputs.expect_ubuntu || github.event.client_payload.expect_ubuntu || '25.10' }}
          INPUT_EXPECT_FINAL_UBUNTU: ${{ inputs.expect_final_ubuntu || github.event.client_payload.expect_final_ubuntu || '25.10' }}
          INPUT_ALLOW_EXISTING_UBUNTU: ${{ inputs.allow_existing_ubuntu || github.event.client_payload.allow_existing_ubuntu || false }}
          INPUT_ALLOW_INSTALL_REBOOT: ${{ inputs.allow_install_reboot || github.event.client_payload.allow_install_reboot || false }}
          INPUT_TIMEOUT: ${{ inputs.install_timeout_seconds || github.event.client_payload.install_timeout_seconds || '14400' }}
          INPUT_POST_REBOOT_TIMEOUT: ${{ inputs.post_reboot_timeout_seconds || github.event.client_payload.post_reboot_timeout_seconds || '14400' }}
        run: |
          artifacts_dir="$GITHUB_WORKSPACE/tests/artifacts/factory-e2e-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          args=(
            --ssh-target "$SSH_TARGET"
            --ssh-key "$RUNNER_TEMP/acfs-factory-e2e/id"
            --ref "$INPUT_REF"
            --mode "$INPUT_MODE"
            --expect-ubuntu "$INPUT_EXPECT_UBUNTU"
            --expect-final-ubuntu "$INPUT_EXPECT_FINAL_UBUNTU"
            --install-timeout "$INPUT_TIMEOUT"
            --post-reboot-timeout "$INPUT_POST_REBOOT_TIMEOUT"
            --artifacts-dir "$artifacts_dir"
          )
          if [[ -n "${SSH_PORT:-}" ]]; then
            args+=(--ssh-port "$SSH_PORT")
          fi
          if [[ -f "$RUNNER_TEMP/acfs-factory-e2e/id.pub" ]]; then
            args+=(--public-key-file "$RUNNER_TEMP/acfs-factory-e2e/id.pub")
          fi
          if [[ "$INPUT_ALLOW_EXISTING_UBUNTU" == "true" ]]; then
            args+=(--allow-existing-ubuntu)
          fi
          if [[ "$INPUT_ALLOW_INSTALL_REBOOT" == "true" ]]; then
            args+=(--allow-install-reboot)
          fi
          bash tests/vm/test_factory_install_ubuntu.sh "${args[@]}"

      - name: Upload factory E2E artifacts
        if: always() && steps.config.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: factory-installer-e2e
          path: tests/artifacts
