name: Installer Canary (Docker)

on:
  workflow_dispatch:
    inputs:
      ubuntu:
        description: "Ubuntu version: 24.04, 25.04, 25.10, or all"
        default: "25.10"
        required: true
      mode:
        description: "Install mode: vibe or safe"
        default: "vibe"
        required: true

jobs:
  canary:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run installer canary
        env:
          ACFS_CHECKSUMS_REF: main
          INPUT_UBUNTU: ${{ inputs.ubuntu }}
          INPUT_MODE: ${{ inputs.mode }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          chmod +x ./tests/vm/test_install_ubuntu.sh

          UBUNTU="${INPUT_UBUNTU:-25.10}"
          MODE="${INPUT_MODE:-vibe}"

          if [[ "$EVENT_NAME" == "workflow_dispatch" && "$UBUNTU" == "all" ]]; then
            ./tests/vm/test_install_ubuntu.sh --all --mode "$MODE"
          else
            ./tests/vm/test_install_ubuntu.sh --ubuntu "$UBUNTU" --mode "$MODE"
          fi
